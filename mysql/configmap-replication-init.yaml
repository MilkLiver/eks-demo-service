apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-replication-init
data:
  init-replica.sh: |
    #!/bin/bash
    set -e

    echo "[init-replica] Waiting for MySQL real server (TCP) to be ready..."
    # Use -h 127.0.0.1 to force TCP connection.
    # The Docker entrypoint's temp server runs with --skip-networking (socket only),
    # so this ensures we wait for the REAL server.
    until mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -h 127.0.0.1 -e "SELECT 1" &>/dev/null; do
      sleep 3
    done
    echo "[init-replica] MySQL real server is ready."

    # Check if replication is already configured
    REPLICA_STATUS=$(mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SHOW REPLICA STATUS\G" 2>/dev/null || \
                     mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SHOW SLAVE STATUS\G" 2>/dev/null || true)
    if echo "$REPLICA_STATUS" | grep -qE "(Replica_IO|Slave_IO)_Running: Yes"; then
      echo "[init-replica] Replication already configured and running, skipping."
      exit 0
    fi

    echo "[init-replica] Configuring GTID-based replication..."
    # Configure GTID-based replication
    mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "
    SET GLOBAL super_read_only=OFF;
    SET GLOBAL read_only=OFF;
    CHANGE REPLICATION SOURCE TO
      SOURCE_HOST='mysql-primary',
      SOURCE_PORT=3306,
      SOURCE_USER='replicator',
      SOURCE_PASSWORD='${MYSQL_REPLICATION_PASSWORD}',
      SOURCE_AUTO_POSITION=1,
      GET_SOURCE_PUBLIC_KEY=1;
    START REPLICA;
    "

    # Wait for replica threads to start
    sleep 2

    # Verify replication started
    VERIFY=$(mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SHOW REPLICA STATUS\G" 2>/dev/null || \
             mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SHOW SLAVE STATUS\G" 2>/dev/null || true)
    if echo "$VERIFY" | grep -qE "(Replica_IO|Slave_IO)_Running: Yes"; then
      echo "[init-replica] Replication started successfully."
    else
      echo "[init-replica] WARNING: Replication may not have started correctly."
      echo "$VERIFY" | grep -iE "(running|error|behind)" || true
    fi

    # Enable read-only mode
    mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "
    SET GLOBAL read_only=ON;
    SET GLOBAL super_read_only=ON;
    "
    echo "[init-replica] Read-only mode enabled."
