apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-primary
  labels:
    app: mysql
    role: primary
spec:
  serviceName: mysql-primary-headless
  replicas: 1
  selector:
    matchLabels:
      app: mysql
      role: primary
  template:
    metadata:
      labels:
        app: mysql
        role: primary
    spec:
      initContainers:
        - name: init-setup
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              sed -e "s/\${MYSQL_REPLICATION_PASSWORD}/${MYSQL_REPLICATION_PASSWORD}/g" \
                  -e "s/\${MYSQL_PASSWORD}/${MYSQL_PASSWORD}/g" \
                  /mnt/config/init-replication.sql > /docker-entrypoint-initdb.d/init-replication.sql
          env:
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_REPLICATION_PASSWORD
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /mnt/config
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /etc/mysql/conf.d
              subPath: my.cnf
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/mysql
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-u", "root", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mysql", "-u", "root", "-p$(MYSQL_ROOT_PASSWORD)", "-e", "SELECT 1"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: mysql-primary-config
        - name: initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteMany"]
        storageClassName: efs-sc
        resources:
          requests:
            storage: 10Gi
