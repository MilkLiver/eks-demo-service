apiVersion: v1
kind: Service
metadata:
  name: mysql-primary
  labels:
    app: mysql
    role: primary
spec:
  type: ClusterIP
  selector:
    app: mysql
    role: primary
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-primary-headless
  labels:
    app: mysql
    role: primary
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mysql
    role: primary
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-secondary
  labels:
    app: mysql
    role: secondary
spec:
  type: ClusterIP
  selector:
    app: mysql
    role: secondary
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-secondary-headless
  labels:
    app: mysql
    role: secondary
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mysql
    role: secondary
  ports:
    - port: 3306
      targetPort: 3306
