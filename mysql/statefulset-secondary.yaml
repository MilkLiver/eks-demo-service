apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-secondary
  labels:
    app: mysql
    role: secondary
spec:
  serviceName: mysql-secondary-headless
  replicas: 2
  selector:
    matchLabels:
      app: mysql
      role: secondary
  template:
    metadata:
      labels:
        app: mysql
        role: secondary
    spec:
      initContainers:
        - name: init-server-id
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Extract ordinal from hostname (e.g. mysql-secondary-0 -> 0)
              ORDINAL=$(echo "$HOSTNAME" | rev | cut -d'-' -f1 | rev)
              SERVER_ID=$((ORDINAL + 2))
              cp /mnt/configmap/my.cnf /mnt/conf/my.cnf
              echo "server-id=${SERVER_ID}" >> /mnt/conf/my.cnf
              echo "Generated server-id=${SERVER_ID} for ${HOSTNAME}"
          volumeMounts:
            - name: configmap
              mountPath: /mnt/configmap
            - name: config
              mountPath: /mnt/conf
        - name: wait-for-primary
          image: mysql:8.0
          command:
            - bash
            - -c
            - |
              echo "Waiting for mysql-primary to be ready..."
              until mysql -h mysql-primary -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SELECT 1" &>/dev/null; do
                echo "Primary not ready, retrying in 5s..."
                sleep 5
              done
              echo "Primary is ready."
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_REPLICATION_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /etc/mysql/conf.d
            - name: data
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /mnt/scripts
          lifecycle:
            postStart:
              exec:
                command:
                  - bash
                  - /mnt/scripts/init-replica.sh
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - mysqladmin ping -u root -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SELECT 1"
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: configmap
          configMap:
            name: mysql-secondary-config
        - name: config
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: mysql-replication-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteMany"]
        storageClassName: efs-sc
        resources:
          requests:
            storage: 10Gi
